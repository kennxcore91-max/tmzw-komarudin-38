<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMZW KOMARUDIN 38</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{padding:20px;}
input,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
background:#00c6ff;
font-weight:bold;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:15px;
}

.hidden{display:none;}
</style>
</head>
<body>

<div class="container" id="loginPage">
<h2>TMZW KOMARUDIN 38</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button id="loginBtn">Login</button>
</div>

<div class="container hidden" id="dashboard">
<h2>Dashboard</h2>
<button id="logoutBtn">Logout</button>

<div class="card">
<h3>Input Sales Harian</h3>
<input type="date" id="tanggal">
<input type="number" id="sales" placeholder="Total Penjualan">
<input type="number" id="struk" placeholder="Jumlah Struk">
<button id="saveBtn">Simpan</button>
</div>

<div class="card">
<h3>Data Tersimpan</h3>
<div id="dataList">Belum ada data</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCyPdzQAsDENvsIS-lzfoRMI97r1GBYsvM",
authDomain: "tmzw-komarudin-38.firebaseapp.com",
projectId: "tmzw-komarudin-38",
storageBucket: "tmzw-komarudin-38.firebasestorage.app",
messagingSenderId: "247873202745",
appId: "1:247873202745:web:b8edbf0a1117530c8f3be8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginPage = document.getElementById("loginPage");
const dashboard = document.getElementById("dashboard");

document.getElementById("loginBtn").onclick = async ()=>{
const email = document.getElementById("email").value;
const pass = document.getElementById("password").value;
try{
await signInWithEmailAndPassword(auth,email,pass);
alert("Login berhasil");
}catch(e){
alert("Login gagal: "+e.message);
}
};

document.getElementById("logoutBtn").onclick = ()=>{
signOut(auth);
};

onAuthStateChanged(auth,user=>{
if(user){
loginPage.classList.add("hidden");
dashboard.classList.remove("hidden");
loadData();
}else{
loginPage.classList.remove("hidden");
dashboard.classList.add("hidden");
}
});

document.getElementById("saveBtn").onclick = async ()=>{
const tanggal = document.getElementById("tanggal").value;
const sales = Number(document.getElementById("sales").value);
const struk = Number(document.getElementById("struk").value);

if(!tanggal || !sales || !struk){
alert("Lengkapi data dulu");
return;
}

const apc = sales/struk;

await setDoc(doc(db,"sales",tanggal),{
tanggal,
sales,
struk,
std:struk,
spd:sales,
apc:apc
});

alert("Data tersimpan");
loadData();
};

async function loadData(){
const querySnapshot = await getDocs(collection(db,"sales"));
let html="";
querySnapshot.forEach(doc=>{
const d = doc.data();
html+=`
<div style="margin-bottom:10px;">
<b>${d.tanggal}</b><br>
Sales: ${d.sales}<br>
Struk: ${d.struk}<br>
STD: ${d.std}<br>
SPD: ${d.spd}<br>
APC: ${d.apc.toFixed(0)}
</div>
<hr>
`;
});
document.getElementById("dataList").innerHTML = html || "Belum ada data";
}
</script>

</body>
</html>
