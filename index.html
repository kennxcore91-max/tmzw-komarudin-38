<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMZW KOMARUDIN 38</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.container{padding:20px;}

input,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
background:#00c6ff;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:15px;
}

.hidden{display:none;}
</style>
</head>
<body>

<div class="container">

<h2>Login</h2>

<div id="loginBox">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="errorLogin"></p>
</div>

<div id="dashboard" class="hidden">
<h2>Dashboard</h2>
<button onclick="logout()">Logout</button>

<div class="card">
<h3>Input Sales Harian</h3>
<input type="date" id="tanggal">
<input type="number" id="sales" placeholder="Sales">
<input type="number" id="struk" placeholder="Struk">
<button onclick="simpanData()">Simpan</button>
</div>

<div class="card hidden" id="adminBox">
<h3>Input Target Bulanan (Admin)</h3>
<input type="number" id="targetBulanan" placeholder="Target Akumulasi Bulanan">
<button onclick="simpanTarget()">Simpan Target</button>
</div>

<div class="card">
<h3>Data & Perhitungan</h3>
<div id="dataList"></div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyPdzQAsDENvsIS-lzfoRMI97r1GBYsvM",
  authDomain: "tmzw-komarudin-38.firebaseapp.com",
  projectId: "tmzw-komarudin-38",
  storageBucket: "tmzw-komarudin-38.appspot.com",
  messagingSenderId: "247873202745",
  appId: "1:247873202745:web:b8edbf0a1117530c8f3be8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = function(){
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.catch(err=>{
document.getElementById("errorLogin").innerText=err.message;
});
}

window.logout = function(){
signOut(auth);
}

onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

if(user.email==="ikinasikin.co@gmail.com"){
document.getElementById("adminBox").classList.remove("hidden");
}

loadData();
}else{
document.getElementById("loginBox").classList.remove("hidden");
document.getElementById("dashboard").classList.add("hidden");
}
});

window.simpanData = async function(){
const tanggal=document.getElementById("tanggal").value;
const sales=Number(document.getElementById("sales").value);
const struk=Number(document.getElementById("struk").value);

await addDoc(collection(db,"sales"),{
tanggal,
sales,
struk
});

alert("Data tersimpan!");
loadData();
}

window.simpanTarget = async function(){
const target=Number(document.getElementById("targetBulanan").value);

await setDoc(doc(db,"config","target"),{
targetBulanan:target
});

alert("Target disimpan!");
}

async function loadData(){
const snapshot=await getDocs(collection(db,"sales"));
let total=0;
let totalStruk=0;
let html="";

snapshot.forEach((doc)=>{
const d=doc.data();
total+=d.sales;
totalStruk+=d.struk;
html+=`
<p>
${d.tanggal}<br>
Sales: ${d.sales}<br>
Struk: ${d.struk}
</p><hr>
`;
});

let spd=0;
if(totalStruk>0){
spd=total/totalStruk;
}

const targetDoc=await getDoc(doc(db,"config","target"));
let target=0;
if(targetDoc.exists()){
target=targetDoc.data().targetBulanan;
}

let achievement=0;
if(target>0){
achievement=(total/target)*100;
}

html+=`
<h4>Total Akumulasi: ${total}</h4>
<h4>SPD: ${Math.round(spd)}</h4>
<h4>Target Bulanan: ${target}</h4>
<h4>Achievement: ${achievement.toFixed(2)}%</h4>
`;

document.getElementById("dataList").innerHTML=html;
}

</script>
</body>
</html>
