<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMZW KOMARUDIN 38</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.container{
  padding:20px;
  max-width:400px;
  margin:auto;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#00c6ff;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginPage">
    <h2>TMZW KOMARUDIN 38</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button type="button" onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <h2>Dashboard</h2>
    <button onclick="logout()">Logout</button>

    <div class="card">
      <h3>Input Sales Harian</h3>
      <input id="tanggal" type="date">
      <input id="sales" type="number" placeholder="Sales">
      <input id="struk" type="number" placeholder="Jumlah Struk">
      <button onclick="simpanData()">Simpan</button>
    </div>

    <div class="card">
      <h3>Data Tersimpan</h3>
      <div id="dataList"></div>
    </div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyPdzQAsDENvsIS-lzfoRMI97r1GBYsvM",
  authDomain: "tmzw-komarudin-38.firebaseapp.com",
  projectId: "tmzw-komarudin-38",
  storageBucket: "tmzw-komarudin-38.appspot.com",
  messagingSenderId: "247873202745",
  appId: "1:247873202745:web:b8edbf0a1117530c8f3be8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth,email,password);
    alert("Login berhasil");
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    loadData();
  }catch(error){
    alert(error.message);
  }
}

window.logout = async function(){
  await signOut(auth);
  location.reload();
}

window.simpanData = async function(){
  const tanggal = document.getElementById("tanggal").value;
  const sales = parseInt(document.getElementById("sales").value);
  const struk = parseInt(document.getElementById("struk").value);

  if(!tanggal || !sales || !struk){
    alert("Isi semua data");
    return;
  }

  const apc = sales/struk;

  await addDoc(collection(db,"sales"),{
    tanggal,
    sales,
    struk,
    apc
  });

  alert("Data tersimpan");
  loadData();
}

async function loadData(){
  const querySnapshot = await getDocs(collection(db,"sales"));
  let html = "";

  querySnapshot.forEach((doc)=>{
    const d = doc.data();
    html += `
      <p>
      ${d.tanggal}<br>
      Sales: ${d.sales}<br>
      Struk: ${d.struk}<br>
      APC: ${Math.round(d.apc)}
      </p>
      <hr>
    `;
  });

  document.getElementById("dataList").innerHTML = html;
}

</script>

</body>
</html>
