<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMZW KOMARUDIN 38</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.container{
  padding:20px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#00a2cc;
}

.card{
  background:#1e2a38;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="container" id="loginPage">
  <h2>TMZW KOMARUDIN 38</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<div class="container hidden" id="dashboard">
  <h2>Dashboard</h2>
  <button id="logoutBtn">Logout</button>

  <div class="card">
    <h3>Input Sales Harian</h3>
    <input type="number" id="sales" placeholder="Sales Hari Ini">
    <input type="number" id="struk" placeholder="Jumlah Struk">
    <button id="saveBtn">Simpan</button>
  </div>

  <div class="card">
    <h3>Data Hari Ini</h3>
    <p id="todayData">Belum ada data</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyPdzQAsDENvsIS-lzfoRMI97r1GBYsvM",
  authDomain: "tmzw-komarudin-38.firebaseapp.com",
  projectId: "tmzw-komarudin-38",
  storageBucket: "tmzw-komarudin-38.firebasestorage.app",
  messagingSenderId: "247873202745",
  appId: "1:247873202745:web:b8edbf0a1117530c8f3be8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const saveBtn = document.getElementById("saveBtn");

loginBtn.addEventListener("click", () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
    })
    .catch((error) => {
      alert("Login gagal: " + error.message);
    });
});

logoutBtn.addEventListener("click", () => {
  signOut(auth).then(() => {
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
  });
});

saveBtn.addEventListener("click", async () => {
  const sales = document.getElementById("sales").value;
  const struk = document.getElementById("struk").value;
  const today = new Date().toISOString().split("T")[0];

  await setDoc(doc(db, "sales", today), {
    sales: Number(sales),
    struk: Number(struk)
  });

  document.getElementById("todayData").innerText =
    "Sales: Rp " + sales + " | Struk: " + struk;

  alert("Data tersimpan!");
});
</script>

</body>
</html>
