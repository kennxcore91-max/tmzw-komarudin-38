<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMZW KOMARUDIN 38</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}
.container {
  padding:20px;
}
input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}
button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  color:black;
  font-weight:bold;
  width:100%;
}
.card {
  background:#1e2a38;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}
.hidden { display:none; }
</style>
</head>

<body>

<div class="container" id="loginPage">
  <h2>TMZW KOMARUDIN 38</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p onclick="alert('Silakan hubungi CIF TMZW untuk mendapatkan password login.')" style="cursor:pointer;color:#00c6ff;">Lupa Kata Sandi?</p>
  <p id="error" style="color:red;"></p>
</div>

<div class="container hidden" id="dashboard">
  <h2>Dashboard</h2>
  <button onclick="logout()">Logout</button>

  <div class="card">
    <h3>Input Sales Harian</h3>
    <input type="number" id="sales" placeholder="Sales Harian">
    <input type="number" id="struk" placeholder="Struk Harian">
    <button onclick="saveData()">Simpan</button>
  </div>

  <div class="card">
    <h3>Data Hari Ini</h3>
    <p id="todayData"></p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCyPdzQAsDENvsIS-lzfoRMI97r1GBYsvM",,
    authDomain: "tmzw-komarudin-38.firebaseapp.com",
    projectId: "tmzw-komarudin-38",
    storageBucket: "tmzw-komarudin-38.firebasestorage.app",
    messagingSenderId: "247873202745",
    appId: "1:247873202745:web:b8edbf0a1117530c8f3be8"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const loginBtn = document.querySelector("button");
  const emailInput = document.querySelectorAll("input")[0];
  const passwordInput = document.querySelectorAll("input")[1];

  loginBtn.addEventListener("click", () => {
    const email = emailInput.value;
    const password = passwordInput.value;

    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        alert("Login berhasil!");
        window.location.href = "dashboard.html";
      })
      .catch((error) => {
        alert(error.message);
      });
  });
</script>
